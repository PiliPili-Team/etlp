name: Build Binaries on Tag

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: etlp

jobs:
  build-and-package:
    name: Build & Package for ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: musl => fully static, runs without extra system libs.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            target_name: linux-amd64
            asset_name: etlp-linux-amd64.tar.gz
            archive: tar
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            target_name: linux-aarch64
            asset_name: etlp-linux-aarch64.tar.gz
            archive: tar
          # macOS: both Intel and Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-13
            target_name: macos-amd64
            asset_name: etlp-macos-amd64.tar.gz
            archive: tar
          - target: aarch64-apple-darwin
            os: macos-latest
            target_name: macos-aarch64
            asset_name: etlp-macos-aarch64.tar.gz
            archive: tar
          # Windows: MSVC target, no extra runtime needed.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            target_name: windows-amd64
            asset_name: etlp-windows-amd64.zip
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: |
          tar -czvf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release ${{ env.BIN_NAME }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 30

  create-github-release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksum file
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            -exec sha512sum {} + > ../etlp.sha512sum
          cd ..

      - name: Create Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          artifact: "artifacts/**/*.tar.gz,artifacts/**/*.zip,etlp.sha512sum"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
