name: Build macOS amd64 Binary

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: macos-amd64 binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        shell: bash
        run: bash scripts/build-macos-binary.sh --arch amd64

      - uses: actions/upload-artifact@v4
        with:
          name: binary-macos-amd64
          path: dist/binaries/etlp-macos-amd64.tar.gz
          retention-days: 7
